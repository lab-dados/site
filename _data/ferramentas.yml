- nome: "juscraper"
  categoria: "pacote"
  status: "estavel"
  descricao: "Raspador de tribunais brasileiros (22 TJs estaduais + Datajud + JusBR). Funções `cjpg`, `cjsg`, `cpopg`, `cposg`."
  linguagem: "Python"
  repo: "https://github.com/jtrecenti/juscraper"
  docs: "https://jtrecenti.github.io/juscraper/"
  pip: "juscraper"

- nome: "dataframeit"
  categoria: "pacote"
  status: "estavel"
  descricao: "Enriquece DataFrames com LLMs e saída estruturada via Pydantic. Suporta Google, OpenAI, Anthropic, Cohere, Mistral."
  linguagem: "Python"
  repo: "https://github.com/bdcdo/dataframeit"
  docs: "https://bdcdo.github.io/dataframeit/"
  pip: "dataframeit"

- nome: "labdados (SDK)"
  categoria: "sdk"
  status: "beta"
  descricao: "SDK oficial do escritório de apoio: OCR, transcrição, estruturação com LLMs e análise de viabilidade. Modos nuvem e local."
  linguagem: "Python"
  repo: "https://github.com/lab-dados/labdados-sdk"
  pip: "labdados"

- nome: "labdados-core"
  categoria: "pacote"
  status: "beta"
  descricao: "Núcleo Python compartilhado entre o backend do escritório de apoio e o SDK — contracts, viabilidade, OCR e estruturação."
  linguagem: "Python"
  repo: "https://github.com/lab-dados/labdados-core"
  pip: "labdados-core"

- nome: "Marketplace de skills"
  categoria: "skill"
  status: "estavel"
  descricao: "Plugins de Claude Code para pesquisa empírica em direito: juscraper, dataframeit, openalex, raspe, scrum-master, explainer-video."
  linguagem: "Markdown"
  repo: "https://github.com/lab-dados/labdados-skills"

- nome: "Escritório de apoio"
  categoria: "servico"
  status: "beta"
  descricao: "Portal web com OCR, transcrição, estruturação por LLMs e anonimização sob demanda. Roda em Azure Brazil South."
  linguagem: "Python + React"
  repo: "https://github.com/lab-dados/escritorio-servicos"
  link: "https://labdados-frontend.livelydesert-3e3e3dd8.brazilsouth.azurecontainerapps.io"

- nome: "Portal de dados (Dataverse)"
  categoria: "dados"
  status: "beta"
