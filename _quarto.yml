project:
  type: website
  output-dir: _site
  pre-render:
    - tools/build_data.py
  resources:
    - "assets/**"
    - "CNAME"

website:
  title: "LabDados"
  description: "Laboratório de Dados e Pesquisa Empírica em Direito · FGV Direito SP"
  site-url: "https://lab-dados.github.io/site"
  repo-url: "https://github.com/lab-dados/site"
  repo-actions: [edit, issue]
  open-graph: true
  twitter-card: true
  favicon: assets/favicon.svg

  navbar:
    logo: assets/logo-mark.png
    title: false
    pinned: true
    collapse-below: lg
    left:
      - text: "Sobre"
        href: sobre/index.qmd
      - text: "Pesquisa"
        href: pesquisas/index.qmd
      - text: "Escritório de apoio"
        href: escritorio/index.qmd
      - text: "Ferramentas"
        href: ferramentas/index.qmd
      - text: "Dados"
        href: dados/index.qmd
      - text: "Aprenda"
        href: aprenda/index.qmd
      - text: "Blog ↗"
        href: https://labdados.substack.com/
        target: _blank
    right:
      - icon: github
        href: https://github.com/lab-dados
        aria-label: GitHub do LabDados

  page-footer:
    border: false
    center: |
      <div class="ld-footer-brand">
        <img src="/assets/logo-wordmark.png" alt="LabDados · Laboratório de Dados e Pesquisa Empírica em Direito · FGV Direito SP">
        <div class="ld-footer-meta">
          FGV Direito SP · Rua Dr. Plínio Barreto, 365 · Bela Vista · São Paulo<br>
          <code>labdados.direitosp [at] fgv [.] br</code>
        </div>
        <div class="ld-footer-icons">
          <a href="https://github.com/lab-dados" aria-label="GitHub do LabDados"><i class="bi bi-github"></i></a>
          <a href="https://labdados.substack.com/" target="_blank" rel="noopener" aria-label="Blog no Substack"><i class="bi bi-substack"></i></a>
        </div>
        <div class="ld-footer-fineprint">
          Feito em <a href="https://quarto.org">Quarto</a>. Conteúdo sob <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>.
        </div>
      </div>

format:
  html:
    theme:
      - cosmo
      - assets/theme.scss
    css: assets/styles.css
    toc: false
    page-layout: full
    grid:
      sidebar-width: 0px
      body-width: 1100px
      margin-width: 0px
      gutter-width: 1.5rem
    link-external-newwindow: true
    link-external-icon: false
    smooth-scroll: true
    anchor-sections: true
    code-copy: true
    code-overflow: wrap
    include-in-header:
      - assets/fonts.html

lang: pt-BR
