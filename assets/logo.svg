<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" role="img" aria-label="LabDados">
  <g fill="none" stroke="none">
    <!-- mark: stylized 'L.' as a small dot-grid -->
    <g transform="translate(4,8)">
      <rect x="0"  y="0"  width="6" height="6" rx="1.5" fill="#ffffff"/>
      <rect x="0"  y="10" width="6" height="6" rx="1.5" fill="#ffffff" opacity="0.8"/>
      <rect x="0"  y="20" width="6" height="6" rx="1.5" fill="#ffffff" opacity="0.6"/>
      <rect x="10" y="20" width="6" height="6" rx="1.5" fill="#00a37a"/>
      <rect x="20" y="20" width="6" height="6" rx="1.5" fill="#ffffff" opacity="0.45"/>
      <rect x="30" y="20" width="6" height="6" rx="1.5" fill="#00a37a" opacity="0.7"/>
    </g>
    <text x="50" y="32" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="700" font-size="22" fill="#ffffff" letter-spacing="-0.5">
      Lab<tspan fill="#00a37a">Dados</tspan>
    </text>
  </g>
</svg>
